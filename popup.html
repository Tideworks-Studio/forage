<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save to Forage</title>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rethink+Sans:ital,wght@0,400;0,500;0,700;1,400;1,700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Step 1: loading / no image state -->
  <div id="step1">
    <div id="step1-inner">
      <p id="step1-msg">Right-click an image and choose<br><strong>Save to Forage</strong></p>
    </div>
  </div>

  <!-- Step 2: image preview + form -->
  <div id="step2" class="hidden">
    <div id="step2-inner">

      <!-- Left: image preview with favorite star -->
      <div id="preview-col">
        <button id="favBtn" class="fav-btn" title="Mark as favorite" aria-label="Favorite">
          <svg id="favStar" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
          </svg>
        </button>
        <img id="previewImg" src="" alt="Preview">
      </div>

      <!-- Right: form -->
      <div id="form-col">

        <!-- Source URL -->
        <div id="source-row">
          <span id="source-domain"></span>
        </div>

        <!-- Notes -->
        <div class="form-group">
          <div class="form-label">What do you like about this image?</div>
          <textarea id="notesField" placeholder="These are notes which you can view later"></textarea>
        </div>

        <!-- Tags -->
        <div class="form-group">
          <div class="form-label">What tags match this image?</div>
          <div id="tag-pills">
            <div class="tag-pills-loading">Loading tags…</div>
          </div>
        </div>

      </div>
    </div>

    <!-- Footer -->
    <div id="step2-footer">
      <button id="saveBtn" class="btn-primary">Save to Forage</button>
      <button id="cancelBtn" class="btn-secondary">Cancel</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="supabase.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
